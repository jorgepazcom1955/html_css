<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.conteiner {
            background-color: darksalmon;
            display: flex;
            flex-flow: row nowrap;
        }

        div.iten {
            background-color: brown;
            border: 1px solid black;
            text-align: center;
            flex-basis: 200px;
        }

        div#cxA {
            flex-grow: 5;
            flex-shrink: 0;
        }
        div#cxB {
            flex-grow: 2;
            flex-shrink: 1;
        }
        
        div#cxC {
            flex-grow: 1;
            flex-shrink: 3;
        }  
    </style>
</head>
<body>
    <div class="conteiner">
        <div class="iten" id="cxA">A</div>
        <div class="iten" id="cxB">B</div>
        <div class="iten" id="cxC">C</div>
    </div>
</body>
</html>
