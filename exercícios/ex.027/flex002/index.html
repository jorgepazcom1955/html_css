<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.conteiner {
            background-color: darksalmon;
            display: flex;
        }

        div.iten {
            background-color: brown;
            border: 1px solid black;
            flex: auto;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="conteiner">
        <div class="iten">Exemplo de Bloco A</div>
        <div class="iten">Exemplo de Bloco B</div>
        <div class="iten">Exemplo de Bloco C</div>
        <div class="iten">Exemplo de Bloco D</div>
        <div class="iten">Exemplo de Bloco E</div>
        <div class="iten">Exemplo de Bloco F</div>
        <div class="iten">Exemplo de Bloco G</div>
    </div>Exemplo de Bloco 
</body>
</html>
