<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <fieldset>
        <legend>Dados Pessoas</legend>
        <form action="cadastro.php" method="get" autocomplete="on">
            <p>
                <label for="inome">Nome</label>
                <input type="text" name="nome" id="inome"
                 minlength="5" maxlength="20" required>
            </p>
            <p>
                <label for="isobrenome">Sobrenome</label>
                <input type="text" name="sobrenome" id="isobrenome" 
                minlength="5" maxlength="20" required>
            </p>
            <p>
                <label for="iemail">Email</label>
                <input type="email" name="email" id="iemail" required>
            </p>
            <p>
                <label for="itel">Telefone</label>
                <input type="tel" name="tel" id="itel" autocomplete="tel"
                 pattern=".?\d{4,5}-\d{4}$" placeholder="xxxxx-xxxx" required>
            </p>
    </fieldset>
        <!-- Estudar mais sobre regEx -->
        <p>
            <input type="submit" value="Enviar" autocomplete="email">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
