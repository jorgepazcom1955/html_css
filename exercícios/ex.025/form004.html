<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <p>
            <label for="iemail">Email</label>
            <input type="email" name="email" id="iemail" required> 
        </p>

        <p>
            <label for="itel">Telefone</label>
            <input type="tel" name="tel" id="itel" autocomplete="tel" pattern="!\d{4,5}-\d{4}$ " required>
        </p>
        <!-- Estudar mais sobre regEx -->
        <p>
            <input type="submit" value="Enviar" autocomplete="email">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
