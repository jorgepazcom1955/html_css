<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <form action="cadastro.php" method="post">
    <fieldset>
        <legend>Exemplo</legend>
    <p>
        <label for="iest">Estado</label>
        <select name="estado" id="iest">
            <optgroup label="Região Sudeste">
                <option value="" selected>---Escolha---</option>
                <option value="RJ">Rio de Janeiro</option>
                <option value="SP">São Paulo</option>
                <option value="MG">Minas Gerais</option>
                <option value="ES">Espirito Santo</option>
            </optgroup>

            <optgroup label="Região Nordeste">
                <option value="MA">Maranhão</option>
                <option value="PE">Pernambuco</option>
                <option value="RN">Rio Grande do Norte</option>
                <option value="BA">Bahia</option>
            </optgroup>
        </select>
    </p>
    <p>
        <label for="iprof">Professor</label>
        <input type="text" name="prof" id="iprof" list="istprof">
    <datalist id="istprof">   
        <option>Administrador</option>
        <option>Contabilidade</option>
        <option>Desenvolvedor</option>
        <option>Professor</option>
    </datalist>     
    </p>
    <p>
    <p>
    <label for="imsg">Mensagem</label> <br>
    <textarea name="msg" id="imsg" cols="30" rows="10">
    </textarea>
    </p>

    </fieldset> <br>  
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </p>     
    </form>
</body>
</html>
