<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <form action="cadastro.php" method="Post" autocomplete="on">
    <p>
        <label for="icor">Cor</label>
        <input type="color" name="cor" id="icor"
         value="#00ff00" min="1" max="5" value="2">
    </p>
    <p>
        <label for="inivel">Nível de satisfação</label>
        <input type="range" name="nivel" id="inivel">
    </p>
    <p>
    <p>
        <label for="ifoto">Foto</label>
        <input type="file" name="foto" id="ifoto">
    </p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </p> 
    </form>
</body>
</html>
