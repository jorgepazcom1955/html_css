<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas </title>
</head>
<body>
    <h1>Exercícios de tabelas</h1>
    <table>
        <caption>
            Filmes Favoritos 
        </caption>
       <thead>
            <tr>
                <th>Grupos</th>
                <th>Nomes</th>
                <th rowspan="3">Filmes</th>
            </tr>
       </thead>
       <tbody>
            <tr>
                <th rowspan="3">Mulheres</th>
                <td>Ana Maria Santos</td>
                <td>Alien</td>
                <td>Rambo</td>
                <td>Vingadore</td>
            </tr>
            <tr>
                <td></td>
            </tr>
       </tbody>
    </table>
</body>
</html>
