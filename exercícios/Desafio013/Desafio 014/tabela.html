<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <style>
        tbody {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
        }

        caption {
            font-size: 1.3em;
            font-weight: bold;
            padding: 10px;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Desafio-014</h1>
    <table>
    <caption>Desafio de tabela</caption>
    <thead>
        <th>Área</th>
        <th>Disciplinas</th>
        <th>Notas, Nota 1, Nota 2</th>
        <th>Média</th>
    </thead>
    <tbody>

    </tbody>
    </table>
    </body>
</html>
