<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela </title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 400px;
        }

        td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Mesclagem de tabela</h1>
    <table>
        <tr>
            <td colspan="3">A</td>
            <td rowspan="3">B</td>
            
        </tr>
        <tr>
            <td>E</td>
            <td>F</td>
            <td>G</td>
            
        </tr>
        <tr>
            <td>I</td>
            <td>J</td>
            <td>L</td>
            
        </tr>
        <tr>
            <td colspan="3">N</td>
            
            <td>Q</td>
        </tr>
    </table>
</body>
</html>
